name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: write

jobs:
  fmt:
    if: github.actor != 'github-actions[bot]'
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

  lint:
    if: github.actor != 'github-actions[bot]'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7

  test:
    if: github.actor != 'github-actions[bot]'
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go test
        run: go test ./...

      - name: Fuzz smoke test
        run: go test -run=FuzzSanitizePhone -fuzz=FuzzSanitizePhone -fuzztime=10s ./generators

  screenshots:
    if: github.actor != 'github-actions[bot]'
    name: Update screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/incipit ./cmd/incipit

      - name: Regenerate screenshots
        run: ./bin/incipit screenshots --input assets/example_resumes/software_engineer.yml

      - name: Commit updated screenshots
        run: |
          if ! git diff --quiet assets/example_results/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/example_results/
            git commit -m "chore: update screenshots"
            git push
          fi
